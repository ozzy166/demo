<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PPC</title>
    <link
      rel="shortcut icon"
      href="./images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="bg-[hsl(30,38%,92%)] max-sm:px-4 py-10">
    <div class=" sm:flex  justify-center sm:mt-36">

      <img class=" block md:hidden rounded-tl-[10px] rounded-tr-[10px]" src="./images/image-product-mobile.jpg" alt="">

        </p>

          <p class=" font-bold text-4xl text-[hsl(158,36%,37%)]">$149.99</p>
          <p>$169.99</p>
        </div>
        <div class=" flex items-center gap-3 bg-[hsl(158,36%,37%)] hover:bg-[hsl(158,42%,18%)] justify-center rounded-[10px]  h-[1.4cm]  text-white" >
